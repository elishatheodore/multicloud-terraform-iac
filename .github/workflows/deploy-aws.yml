name: Deploy AWS Infrastructure

on:
  push:
    branches: [ main ]
    paths: [ 'clouds/aws/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'clouds/aws/**' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - staging
        - prod

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ">=1.3.0"

    - name: Terraform Init
      run: terraform init
      working-directory: clouds/aws/examples/complete

    - name: Terraform Validate
      run: terraform validate
      working-directory: clouds/aws/examples/complete

    - name: Terraform Plan (Dev)
      run: terraform plan -var-file=dev.tfvars -out=tfplan-dev
      working-directory: clouds/aws/examples/complete

    - name: Terraform Plan (Staging)
      run: terraform plan -var-file=staging.tfvars -out=tfplan-staging
      working-directory: clouds/aws/examples/complete

    - name: Terraform Plan (Prod)
      run: terraform plan -var-file=prod.tfvars -out=tfplan-prod
      working-directory: clouds/aws/examples/complete

    - name: Terraform Plan Summary
      run: terraform show -json tfplan-dev | jq -r '.planned_values'
      working-directory: clouds/aws/examples/complete

  terraform-apply:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: terraform-plan
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ">=1.3.0"

    - name: Terraform Init
      run: terraform init
      working-directory: clouds/aws/examples/complete

    - name: Terraform Apply
      run: terraform apply -var-file=${{ github.event.inputs.environment || 'dev' }}.tfvars -auto-approve
      working-directory: clouds/aws/examples/complete

    - name: Terraform Output
      run: terraform output -json
      working-directory: clouds/aws/examples/complete

  terraform-destroy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ">=1.3.0"

    - name: Terraform Init
      run: terraform init
      working-directory: clouds/aws/examples/complete

    - name: Terraform Destroy
      run: terraform destroy -auto-approve
      working-directory: clouds/aws/examples/complete
