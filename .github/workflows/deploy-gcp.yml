name: Deploy GCP

# Manual trigger only — cloud credentials are environment-specific.
# Deployment to live infrastructure should be deliberate, not automatic.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev/staging/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - staging
        - prod
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply

env:
  GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
  GCLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ">=1.3.0"

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Terraform Init
      run: terraform init
      working-directory: clouds/gcp/examples/complete

    - name: Terraform Plan
      if: github.event.inputs.action == 'plan'
      run: terraform plan -var-file=${{ github.event.inputs.environment }}.tfvars
      working-directory: clouds/gcp/examples/complete

    - name: Terraform Apply
      if: github.event.inputs.action == 'apply'
      run: terraform apply -auto-approve -var-file=${{ github.event.inputs.environment }}.tfvars
      working-directory: clouds/gcp/examples/complete

    - name: Terraform Output
      run: terraform output -json
      working-directory: clouds/gcp/examples/complete

  terraform-destroy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ">=1.3.0"

    - name: Terraform Init
      run: terraform init
      working-directory: clouds/gcp/examples/complete

    - name: Terraform Destroy
      run: terraform destroy -auto-approve
      working-directory: clouds/gcp/examples/complete
