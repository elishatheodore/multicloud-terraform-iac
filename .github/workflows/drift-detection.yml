name: Drift Detection

on:
  schedule:
    # Run every weekday at 06:00 UTC
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check (dev/staging/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - staging
        - prod

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
  GCLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  drift-detection-azure:
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'prod' || github.event_name == 'schedule'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ">=1.3.0"

    - name: Terraform Init (Azure)
      run: terraform init
      working-directory: clouds/azure/examples/complete

    - name: Terraform Plan (Azure)
      run: terraform plan -var-file=${{ github.event.inputs.environment || 'dev' }}.tfvars -detailed-exitcode
      working-directory: clouds/azure/examples/complete
      continue-on-error: true

    - name: Check Azure Drift
      run: |
        if [ $? -eq 2 ]; then
          echo "❌ Infrastructure drift detected in Azure!"
          echo "Review the plan output above for changes."
          exit 1
        else
          echo "✅ No infrastructure drift in Azure"
        fi
      working-directory: clouds/azure/examples/complete

  drift-detection-aws:
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'prod' || github.event_name == 'schedule'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ">=1.3.0"

    - name: Terraform Init (AWS)
      run: terraform init
      working-directory: clouds/aws/examples/complete

    - name: Terraform Plan (AWS)
      run: terraform plan -var-file=${{ github.event.inputs.environment || 'dev' }}.tfvars -detailed-exitcode
      working-directory: clouds/aws/examples/complete
      continue-on-error: true

    - name: Check AWS Drift
      run: |
        if [ $? -eq 2 ]; then
          echo "❌ Infrastructure drift detected in AWS!"
          echo "Review the plan output above for changes."
          exit 1
        else
          echo "✅ No infrastructure drift in AWS"
        fi
      working-directory: clouds/aws/examples/complete

  drift-detection-gcp:
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'prod' || github.event_name == 'schedule'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ">=1.3.0"

    - name: Terraform Init (GCP)
      run: terraform init
      working-directory: clouds/gcp/examples/complete

    - name: Terraform Plan (GCP)
      run: terraform plan -var-file=${{ github.event.inputs.environment || 'dev' }}.tfvars -detailed-exitcode
      working-directory: clouds/gcp/examples/complete
      continue-on-error: true

    - name: Check GCP Drift
      run: |
        if [ $? -eq 2 ]; then
          echo "❌ Infrastructure drift detected in GCP!"
          echo "Review the plan output above for changes."
          exit 1
        else
          echo "✅ No infrastructure drift in GCP"
        fi
      working-directory: clouds/gcp/examples/complete
